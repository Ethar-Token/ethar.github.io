*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;

body{
background:#0b1220;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:30px;
color:#fff;
}

.container{
width:100%;
max-width:650px;
background:#151e2f;
padding:40px;
border-radius:20px;
box-shadow:0 20px 40px rgba(0,0,0,.4);
}

.logo{
text-align:center;
margin-bottom:35px;
}

.logo h1{
color:#f4b400;
font-size:38px;
}

.logo p{
color:#9fa7b7;
margin-top:8px;
}

.row{
display:grid;
grid-template-columns:1fr 1fr;
gap:18px;
margin-bottom:18px;
}

.field{
margin-bottom:18px;
}

label{
display:block;
margin-bottom:8px;
font-weight:600;
}

input,
select{
width:100%;
padding:14px;
background:#0b1220;
border:1px solid #2f3f5e;
border-radius:10px;
color:#fff;
font-size:15px;
outline:none;
transition:.25s;
}

input:focus,
select:focus{
border-color:#f4b400;
}

.password-box{
position:relative;
}

.password-box input{
padding-right:70px;
}

.show{
position:absolute;
right:15px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
color:#f4b400;
font-size:14px;
font-weight:600;
}

.requirements{
background:#0b1220;
border:1px solid #2f3f5e;
padding:15px;
border-radius:10px;
margin-bottom:20px;
}

.requirements h3{
font-size:16px;
margin-bottom:10px;
color:#f4b400;
}

.requirements p{
font-size:14px;
margin:6px 0;
color:#c7ccd8;
}

.good{
color:#58d68d;
}

.bad{
color:#ff7675;
}

.checkbox{
display:flex;
align-items:flex-start;
gap:12px;
margin:25px 0;
}

.checkbox input{
width:20px;
height:20px;
margin-top:2px;
}

.checkbox label{
margin:0;
font-weight:400;
line-height:1.6;
}

.checkbox a{
color:#f4b400;
text-decoration:none;
}

.btn{
width:100%;
padding:15px;
border:none;
border-radius:10px;
font-size:17px;
font-weight:700;
cursor:pointer;
transition:.3s;
}

.signup{
background:#f4b400;
color:#111;
margin-bottom:15px;
}

.signup:hover{
transform:translateY(-2px);
}

.login{
display:block;
text-align:center;
background:#0b1220;
border:1px solid #2f3f5e;
padding:15px;
border-radius:10px;
text-decoration:none;
color:#fff;
font-weight:600;
}

.login:hover{
border-color:#f4b400;
}

@media(max-width:700px){

.container{
padding:25px;
}

.row{
grid-template-columns:1fr;
}

.logo h1{
font-size:30px;
}

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const supabaseUrl = "https://ynohexdhktetiepmbwnx.supabase.co";

const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlub2hleGRoa3RldGllcG1id254Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM3MDU5ODcsImV4cCI6MjA5OTI4MTk4N30.bOgCv0UJxYvNSXDxCFs9_6lWfm-h5RipjLzqFIC7Miw";

const client = supabase.createClient(
    supabaseUrl,
    supabaseKey
);

function togglePass(id, el){

const input = document.getElementById(id);

if(input.type==="password"){

input.type="text";

el.innerHTML="Hide";

}else{

input.type="password";

el.innerHTML="Show";

}

}

const pass=document.getElementById("pass");

const r1=document.getElementById("r1");
const r2=document.getElementById("r2");
const r3=document.getElementById("r3");
const r4=document.getElementById("r4");
const r5=document.getElementById("r5");

pass.addEventListener("keyup",()=>{

const value=pass.value;

update(r1,value.length>=8);

update(r2,/[A-Z]/.test(value));

update(r3,/[a-z]/.test(value));

update(r4,/[0-9]/.test(value));

update(r5,/[^A-Za-z0-9]/.test(value));

});

function update(element, valid){

if(valid){

element.className="good";

element.innerHTML="✔ "+element.innerHTML.substring(2);

}else{

element.className="bad";

element.innerHTML="✖ "+element.innerHTML.substring(2);

}

}

document.getElementById("signupForm").addEventListener("submit", async function(e){

e.preventDefault();

const password = pass.value;
const confirm = document.getElementById("confirm").value;

if(password !== confirm){

alert("Passwords do not match.");
return;

}

if(password.length < 8 ||
!/([A-Z])/.test(password) ||
!/([a-z])/.test(password) ||
!/([0-9])/.test(password) ||
!/[^A-Za-z0-9]/.test(password)){

alert("Your password does not meet the required security requirements.");
return;

}

const agree = document.querySelector(".checkbox input");

if(!agree.checked){

alert("You must agree to the Terms of Use, Privacy Policy and Cookie Policy.");
return;

}


const firstName = document.getElementById("firstName").value.trim();
const lastName = document.getElementById("lastName").value.trim();
const email = document.getElementById("email").value.trim();
const phone = document.getElementById("phone").value.trim();
const dob = document.getElementById("dob").value;
const country = document.getElementById("country").value;
const referral = document.getElementById("referral").value.trim();

if (country === "Select your country") {
    alert("Please select your country.");
    return;
}
    
const { data: existingEmail } = await client
    .from("profiles")
    .select("id")
    .eq("email", email)
    .maybeSingle();

if (existingEmail) {
    alert("This email address is already registered.");
    return;
}
    
const { data: existingPhone, error: phoneError } = await client
    .from("profiles")
    .select("id")
    .eq("phone", phone)
    .maybeSingle();

if (phoneError) {
    alert(phoneError.message);
    return;
}

if (existingPhone) {
    alert("This phone number is already registered.");
    return;
}

const { data, error } = await client.auth.signUp({

email: email,

password: password,

options:{

emailRedirectTo: window.location.origin + "/confirmed.html",

data:{
first_name: firstName,
last_name: lastName,
phone: phone,
dob: dob,
country: country,
referral_code: referral
}

}

});

if(error){

alert(error.message);
return;

}

alert("Account created successfully. Please check your email to verify your account before logging in.");

window.location.href = "login.html";

});
</script>
