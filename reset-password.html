<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>ETHAR - Reset Password</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#0b1220;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.card{
background:#151e2f;
padding:35px;
border-radius:15px;
width:100%;
max-width:450px;
color:white;
}

h2{
color:#f4b400;
margin-bottom:10px;
}

p{
color:#bfc5d2;
margin-bottom:25px;
line-height:1.6;
}

label{
display:block;
margin-bottom:8px;
margin-top:15px;
font-weight:600;
}

input{
width:100%;
padding:14px;
border:1px solid #2d3b57;
border-radius:10px;
background:#0b1220;
color:white;
}

button{
width:100%;
margin-top:25px;
padding:14px;
background:#f4b400;
border:none;
border-radius:10px;
font-weight:700;
font-size:15px;
cursor:pointer;
}

.notice{
margin-top:20px;
background:#0b1220;
border-left:4px solid #f4b400;
padding:15px;
border-radius:8px;
line-height:1.8;
font-size:14px;
}

a{
color:#f4b400;
text-decoration:none;
}

</style>

</head>

<body>

<div class="card">

<h2>Reset Password</h2>

<p>Create a new password for your ETHAR account.</p>

<label>New Password</label>

<input
type="password"
id="newPassword"
placeholder="Enter new password">

<label>Confirm Password</label>

<input
type="password"
id="confirmPassword"
placeholder="Confirm new password">

<button id="resetBtn">

UPDATE PASSWORD

</button>

<div class="notice">

<strong>Password Requirements</strong>

<br><br>

✔ At least 8 characters<br>
✔ One uppercase letter<br>
✔ One lowercase letter<br>
✔ One number<br>
✔ One special character

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const supabaseUrl = "https://ynohexdhktetiepmbwnx.supabase.co";

const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlub2hleGRoa3RldGllcG1id254Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM3MDU5ODcsImV4cCI6MjA5OTI4MTk4N30.bOgCv0UJxYvNSXDxCFs9_6lWfm-h5RipjLzqFIC7Miw";

const client = supabase.createClient(
    supabaseUrl,
    supabaseKey
);

document
.getElementById("resetBtn")
.addEventListener("click", resetPassword);

async function resetPassword(){

    const newPassword =
        document.getElementById("newPassword").value;

    const confirmPassword =
        document.getElementById("confirmPassword").value;

    if(!newPassword || !confirmPassword){

        alert("Please complete all fields.");
        return;

    }

    if(newPassword !== confirmPassword){

        alert("Passwords do not match.");
        return;

    }

    const passwordRegex =
        /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[!@#$%^&*()_\-+=\[\]{};:'",.<>/?\\|`~]).{8,}$/;

    if(!passwordRegex.test(newPassword)){

        alert(`Password Requirements

✔ At least 8 characters
✔ One uppercase letter
✔ One lowercase letter
✔ One number
✔ One special character`);

        return;

    }

    const { error } =
        await client.auth.updateUser({

            password:newPassword

        });

    if(error){

        alert(error.message);
        return;

    }

    alert("Password updated successfully.");

    window.location.href="login.html";

}

</script>

</body>
</html>
