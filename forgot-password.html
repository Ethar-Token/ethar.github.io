<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ETHAR - Forgot Password</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#0b1220;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:25px;
color:#fff;
}

.container{
width:100%;
max-width:500px;
background:#151e2f;
padding:40px;
border-radius:20px;
box-shadow:0 20px 40px rgba(0,0,0,.45);
}

.logo{
text-align:center;
margin-bottom:30px;
}

.logo h1{
font-size:40px;
color:#f4b400;
}

.logo p{
color:#aeb6c5;
margin-top:10px;
line-height:1.7;
}

.notice{
background:#0b1220;
border-left:4px solid #f4b400;
padding:15px;
border-radius:10px;
margin-bottom:25px;
color:#ddd;
line-height:1.7;
}

.field{
margin-bottom:20px;
}

label{
display:block;
margin-bottom:8px;
font-weight:600;
}

input{
width:100%;
padding:15px;
background:#0b1220;
border:1px solid #2d3b57;
border-radius:10px;
color:white;
font-size:15px;
outline:none;
}

input:focus{
border-color:#f4b400;
}

.btn{
width:100%;
padding:15px;
border:none;
border-radius:10px;
font-size:17px;
font-weight:700;
cursor:pointer;
margin-bottom:15px;
transition:.3s;
}

.send{
background:#f4b400;
color:#111;
}

.send:hover{
transform:translateY(-2px);
}

.back{
display:block;
text-align:center;
text-decoration:none;
background:#0b1220;
border:1px solid #2d3b57;
padding:15px;
border-radius:10px;
color:white;
font-weight:600;
transition:.3s;
}

.back:hover{
border-color:#f4b400;
}

.footer{
margin-top:30px;
text-align:center;
color:#888;
font-size:14px;
}

@media(max-width:600px){

.container{

padding:28px;

}

.logo h1{

font-size:32px;

}

}

</style>

</head>

<body>

<div class="container">

<div class="logo">

<h1>ETHAR</h1>

<p>

Forgot your password?

</p>

</div>

<div class="notice">

Enter the email address associated with your ETHAR account. If an account exists, we'll send you a password reset link.

</div>

<form>

<div class="field">

<label>Email Address</label>

<input
type="email"
placeholder="Enter your registered email"
required>

</div>

<button class="btn send">

SEND RESET LINK

</button>

<a href="login.html" class="back">

← Back to Login

</a>

</form>

<div class="footer">

© 2026 ETHAR. All Rights Reserved.

</div>

</div>

</body>

</html>
