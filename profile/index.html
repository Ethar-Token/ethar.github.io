*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif}body{background:#0b1220;color:#fff;display:flex}

}

}

#notificationDot{

    right:-2px;

.side a:hover,

.panel{background:#151e2f;padding:25px;border-radius:15px;margin-bottom:20px}h2{color:#f4b400;margin-bottom:18px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.field{display:flex;flex-direction:column}
.field p,
.field input,
.field select{

padding:12px;
background:#0b1220;
border:1px solid #2d3b57;
border-radius:8px;
color:#fff;

}

.notice{

background:#0b1220;

padding:20px;

.danger{

.danger:hover{

label{margin-bottom:6px}input,select{padding:12px;background:#0b1220;color:#fff;border:1px solid #2d3b57;border-radius:8px}.full{grid-column:1/-1}

<script>

document
.getElementById("notificationIcon")
.addEventListener("click", async (e) => {

    e.stopPropagation();

    const menu = document.getElementById("notificationMenu");

    if(menu.classList.contains("show")){

        menu.classList.remove("show");

    }else{

        await loadNotifications();

        menu.classList.add("show");

    }

});

document.addEventListener("click", function(){

        .classList.remove("show");

});

.addEventListener("click", function(e){

});
  
</script>
